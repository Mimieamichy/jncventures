# Netlify deploy config for TanStack Start (nitro)
[build]
  command = "NITRO_PRESET=netlify vite build"
  publish = "dist"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"

# nitro's netlify preset emits the server function and a publish dir;
# leaving framework detection off so Netlify uses the command above as-is.